  <rect x="25" y="52" width="50" height="20" rx="3" fill="#FFE5EC" stroke="#B19FFB" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Top Cake Layer -->
  <rect x="32" y="34" width="36" height="18" rx="2" fill="#F0ECFF" stroke="#B19FFB" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Drips (Bottom Layer) -->
  <path d="M 25 52 C 28 56, 30 56, 32 52 C 34 58, 37 58, 39 52 C 41 55, 44 55, 46 52 C 48 59, 52 59, 55 52 C 58 52, 60 56, 62 52 C 65 58, 68 58, 71 52 C 73 52, 74 54, 75 52" fill="none" stroke="#FFB7CE" stroke-width="2.5" stroke-linecap="round"/>

